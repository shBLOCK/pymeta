name: Lint
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: rustfmt
        run: cargo fmt --check --verbose
  clippy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - toolchain: nightly
            features: "--all-features"
          - toolchain: stable
            features: "--features \"dump_source_on_error\""
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{matrix.toolchain}}
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace --lib ${{matrix.features}} --keep-going